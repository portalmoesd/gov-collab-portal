<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GOV COLLAB PORTAL • Calendar</title>
  <link rel="stylesheet" href="styles.css?v=20260306sb1" />
  <link rel="stylesheet" href="styles/apple.css?v=20260306sb1" />
</head>
<body>

<div class="layout">
  <aside class="sidebar"></aside>
  <main class="main">
    <div class="topbar">
      <div class="page-title">Calendar</div>
    </div>
    
<div class="grid">
  <section class="card col-12" id="formCard">
    <div style="font-weight:900; margin-bottom:10px;">Create / Edit event</div>
    <form id="eventForm" class="calendar-event-form">
      <div class="calendar-form-col calendar-form-col--left">
        <div class="field calendar-field">
          <label>Country</label>
          <select id="countryId"></select>
        </div>
        <div class="field calendar-field">
          <label>Title</label>
          <input id="title" required />
        </div>
        <div class="field calendar-field">
          <label>Document submitter</label>
          <input value="Deputy" readonly aria-readonly="true" />
        </div>
        <div class="field calendar-field">
          <label>Deadline</label>
          <input id="deadlineDate" type="date" />
        </div>
      </div>

      <div class="calendar-form-col calendar-form-col--middle">
        <div class="field calendar-field calendar-field--fill">
          <label>Required sections</label>
          <div id="requiredSectionsBox" class="checklist calendar-sections-box"></div>
        </div>
      </div>

      <div class="calendar-form-col calendar-form-col--right">
        <div class="field calendar-field calendar-field--fill">
          <label>Task</label>
          <textarea id="occasion"></textarea>
        </div>
        <div class="calendar-actions">
          <button class="btn primary" id="saveEventBtn" type="submit">Create event</button>
          <button class="btn" id="resetFormBtn">Reset</button>
        </div>
      </div>
    </form>
    <div id="msg" class="small" style="color:var(--danger); font-weight:800; margin-top:10px;"></div>
  </section>

  <section class="card col-12">
    <div style="font-weight:900; margin-bottom:10px;">Events</div>
    <table class="table">
      <thead><tr><th>Title</th><th>Country</th><th>Deadline</th><th>Active</th><th></th></tr></thead>
      <tbody id="eventsTbody"></tbody>
    </table>
  </section>
</div>

  </main>
</div>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/calendar.js"></script>
</body>
</html>
