<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GOV COLLAB PORTAL • Collaborator I Dashboard</title>
  <link rel="stylesheet" href="styles.css?v=20260306sb2" />
  <link rel="stylesheet" href="styles/apple.css?v=20260307dd1" />
</head>
<body>

<div class="layout">
  <aside class="sidebar"></aside>
  <main class="main">
    <div class="topbar topbar-ghost">
      <div class="page-title">Collaborator I Dashboard</div>
    </div>
    
<div class="grid">
  <section class="card col-12" id="openEditorSection">
    <div class="row">
      <div class="field">
        <label>Event</label>
        <select id="eventSelect" class="portal-select"></select>
      </div>
    </div>
    <div id="msg" class="small" style="color:var(--danger); font-weight:800; margin-top:10px;"></div>
  </section>

  <section class="card col-12 required-sections-panel" id="requiredSectionsPanel">
    <div class="required-sections-head">
      <div>
        <div class="required-sections-title">Required sections</div>
        <div class="required-sections-subtitle">Your assigned sections and their current progress.</div>
      </div>
    </div>
    <div class="required-sections-tablewrap">
      <table class="table required-sections-table">
        <thead><tr><th style="width:35%">Section</th><th class="th-progress" style="width:45%; text-align:center;">Progress</th><th class="th-actions" style="width:20%; text-align:right;">Actions</th></tr></thead>
        <tbody id="sectionsTbody"></tbody>
      </table>
    </div>
    <div id="sectionsCards" class="required-sections-cards"></div>
    <div id="sectionsEmpty" class="required-sections-empty" hidden>Select an event to see your sections.</div>
  </section>

  <section class="card col-12">
    <div style="font-weight:900; margin-bottom:10px;">Upcoming events</div>
    <div class="upcoming-split">
      <div id="eventsCalendar" class="events-calendar"></div>
      <div id="eventsGrid" class="event-grid"></div>
    </div>
  </section>
</div>

  </main>
</div>
  <script src="js/config.js?v=40"></script>
  <script src="js/api.js?v=40"></script>
  <script src="js/app.js?v=47"></script>
  <script src="js/dashboard-collab.js?v=47"></script>
  <script src="js/dashboard-collab-upcoming.js?v=1"></script>
  <script src="js/calendar-collab.js?v=1"></script>
</body>
</html>
