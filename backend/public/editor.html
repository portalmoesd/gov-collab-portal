<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GOV COLLAB PORTAL • Editor</title>
  <link rel="stylesheet" href="styles.css?v=20260307ed3" />
  <link rel="stylesheet" href="styles/apple.css?v=20260307ed3" />
  <style>
    /* Hide CKEditor security warning notification banner */
    .cke_notification, .cke_notifications_area { display:none !important; }
  </style>
</head>
<body>

<div class="layout">
  <aside class="sidebar"></aside>
  <main class="main">
    <div class="topbar editor-page-topbar">
      <div class="page-title editor-page-title">Task Editor</div>
    </div>
    
<section class="card col-12 editor-card editor-card--compact">
  <div class="editor-head">
    <div class="editor-task-card">
      <div class="editor-task-main">
        <div class="editor-kicker">Document workspace</div>
        <h2 class="editor-task-title" id="taskTitle">Task title</h2>
        <div id="meta" class="editor-task-pills"></div>
        <div id="lastUpdated" class="editor-task-updated"></div>
        <div id="returnCommentBox" class="editor-return-box" style="display:none;"></div>
      </div>
      <div class="editor-task-side">
        <div class="editor-status-label">Current status</div>
        <div class="editor-status-line"><span id="statusEl"></span></div>
        <div class="tp-actionbar" aria-label="Editor actions">
        <button class="micro-action micro-action--save" id="btnSave" type="button" aria-label="Save">
          <span class="micro-action__icon" aria-hidden="true"></span>
          <span class="micro-action__label">Save</span>
        </button>
        <button class="micro-action micro-action--submit" id="btnSubmit" type="button" aria-label="Submit">
          <span class="micro-action__icon" aria-hidden="true"></span>
          <span class="micro-action__label">Submit</span>
        </button>
        <button class="micro-action micro-action--approve" id="btnApprove" type="button" aria-label="Approve">
          <span class="micro-action__icon" aria-hidden="true"></span>
          <span class="micro-action__label">Approve</span>
        </button>
        <button class="micro-action micro-action--return" id="btnReturn" type="button" aria-label="Return">
          <span class="micro-action__icon" aria-hidden="true"></span>
          <span class="micro-action__label">Return</span>
        </button>
        </div>
      </div>
    </div>
  </div>

  <div class="editor-frame"><textarea id="editor"></textarea></div>

  <div class="editor-foot">
    <div id="msg" class="small editor-msg"></div>
    <div class="small muted editor-note">CKEditor loads from CDN. If blocked, the editor falls back to a plain textarea.</div>
  </div>
</section>

  </main>
</div>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="https://cdn.ckeditor.com/4.22.1/standard/ckeditor.js"></script>
  <script src="js/editor.js"></script>
</body>
</html>
