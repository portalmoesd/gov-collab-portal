<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GOV COLLAB PORTAL • Calendar</title>
  <link rel="stylesheet" href="styles.css?v=20260307cal2" />
  <link rel="stylesheet" href="styles/apple.css?v=20260307cal2" />
</head>
<body>

<div class="layout">
  <aside class="sidebar"></aside>
  <main class="main">
    <div class="topbar topbar-ghost">
      <div class="page-title">Calendar</div>
    </div>

    <div class="grid">
      <section class="card col-12" id="calendarEventSection">
        <div class="calendar-form-head">
          <div>
            <div class="calendar-eyebrow">Calendar workspace</div>
            <div class="calendar-card-title">Create / Edit event</div>
            <div class="calendar-head-copy">Set up the event, assign required sections and choose the submission endpoint.</div>
          </div>
        </div>

        <form id="eventForm" class="calendar-form-grid">
          <div class="field field-country">
            <label>Country</label>
            <select id="countryId" class="portal-select-native"></select>
          </div>

          <div class="field field-title">
            <label>Title</label>
            <input id="title" class="input portal-input" placeholder="Meeting with the Minister of Economy..." required />
          </div>

          <div class="field field-submitter">
            <label>Document submitter</label>
            <select id="submitterRole" class="portal-select-native">
              <option value="supervisor">Supervisor</option>
              <option value="chairman" selected>Deputy</option>
              <option value="minister">Minister</option>
            </select>
          </div>

          <div class="field field-deadline">
            <label>Deadline</label>
            <input id="deadlineDate" class="input portal-input portal-date" type="date" />
          </div>

          <div class="field field-task">
            <label>Task</label>
            <textarea id="occasion" class="portal-textarea" rows="5" placeholder="Write clear, detailed task instructions here..."></textarea>
          </div>

          <div class="field field-sections">
            <label>Required sections</label>
            <div id="requiredSectionsBox" class="calendar-checklist"></div>
          </div>

          <div class="calendar-form-actions">
            <button class="btn primary" id="saveEventBtn" type="submit">Create event</button>
            <button class="btn" id="resetFormBtn" type="button">Reset</button>
          </div>
        </form>
        <div id="msg" class="small calendar-msg"></div>
      </section>

      <section class="card col-12" id="calendarEventsSection">
        <div class="calendar-section-head">
          <div style="font-weight:900;">Events</div>
          <div class="calendar-section-copy">Manage active meetings and reopen any event for editing.</div>
        </div>
        <div class="calendar-table-wrap">
          <table class="table">
            <thead><tr><th>Title</th><th>Country</th><th>Submitter</th><th>Deadline</th><th>Status</th><th></th></tr></thead>
            <tbody id="eventsTbody"></tbody>
          </table>
        </div>
      </section>
    </div>

  </main>
</div>
  <script src="js/config.js?v=41"></script>
  <script src="js/api.js?v=41"></script>
  <script src="js/app.js?v=48"></script>
  <script src="js/calendar.js?v=20260307cal2"></script>
</body>
</html>
