<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GOV COLLAB PORTAL • Calendar</title>
  <link rel="stylesheet" href="styles.css?v=20260307cal2" />
  <link rel="stylesheet" href="styles/apple.css?v=20260307cal2" />
</head>
<body>

<div class="layout">
  <aside class="sidebar"></aside>
  <main class="main">
    <div class="topbar">
      <div class="page-title">Calendar</div>
    </div>

    <div class="grid calendar-page-grid">
      <section class="card col-12 calendar-card" id="formCard">
        <div class="calendar-header">
          <div class="calendar-eyebrow">Calendar workspace</div>
          <h1 class="calendar-title">Create / Edit event</h1>
          <p class="calendar-subtitle">Create official meetings, assign required sections and choose the submission endpoint.</p>
        </div>

        <form id="eventForm" class="calendar-form" autocomplete="off">
          <div class="calendar-field calendar-country">
            <label for="countryId">Country</label>
            <select id="countryId" class="calendar-input calendar-select"></select>
          </div>

          <div class="calendar-field calendar-title-field">
            <label for="title">Title</label>
            <input id="title" class="calendar-input" placeholder="Meeting title" required />
          </div>

          <div class="calendar-field calendar-task">
            <label for="occasion">Task</label>
            <textarea id="occasion" class="calendar-input calendar-textarea" placeholder="Write clear, detailed task instructions here..."></textarea>
          </div>

          <div class="calendar-field calendar-submitter">
            <label for="submitterRole">Document submitter</label>
            <select id="submitterRole" class="calendar-input calendar-select">
              <option value="chairman" selected>Deputy</option>
              <option value="supervisor">Supervisor</option>
              <option value="minister">Minister</option>
            </select>
          </div>

          <div class="calendar-field calendar-deadline">
            <label for="deadlineDate">Deadline</label>
            <input id="deadlineDate" class="calendar-input" type="date" />
          </div>

          <div class="calendar-field calendar-sections">
            <label>Required sections</label>
            <div id="requiredSectionsBox" class="calendar-sections-grid"></div>
          </div>

          <div class="calendar-actions">
            <button class="btn primary" id="saveEventBtn" type="submit">Create event</button>
            <button class="btn" id="resetFormBtn" type="button">Reset</button>
          </div>
        </form>

        <div id="msg" class="small calendar-msg"></div>
      </section>

      <section class="card col-12 calendar-events-card">
        <div class="calendar-events-head">
          <div style="font-weight:900;">Events</div>
        </div>
        <table class="table calendar-events-table">
          <thead><tr><th>Title</th><th>Country</th><th>Deadline</th><th>Active</th><th></th></tr></thead>
          <tbody id="eventsTbody"></tbody>
        </table>
      </section>
    </div>

  </main>
</div>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/calendar.js?v=20260307cal2"></script>
</body>
</html>
