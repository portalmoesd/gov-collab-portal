<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GOV COLLAB PORTAL • Calendar</title>
  <link rel="stylesheet" href="styles.css?v=20260306sb1" />
  <link rel="stylesheet" href="styles/apple.css?v=20260306sb1" />
</head>
<body>

<div class="layout">
  <aside class="sidebar"></aside>
  <main class="main">
    <div class="topbar topbar-ghost">
      <div class="page-title">Calendar</div>
    </div>
    
<div class="grid">
  <section class="card col-12" id="formCard">
    <div style="font-weight:900; margin-bottom:10px;">Create / Edit event</div>
    <form id="eventForm" class="calendar-event-form">
      <div class="calendar-form-col calendar-form-col--left">
        <div class="field">
          <label>Country</label>
          <select id="countryId"></select>
        </div>
        <div class="field">
          <label>Title</label>
          <input id="title" required />
        </div>
        <div class="field">
          <label>Document submitter</label>
          <select id="submitterRole">
            <option value="supervisor">Supervisor</option>
            <option value="chairman" selected>Deputy</option>
            <option value="super_collaborator">Super-collaborator</option>
            <option value="minister">Minister</option>
          </select>
        </div>
        <div class="field">
          <label>Deadline</label>
          <input id="deadlineDate" type="date" />
        </div>
      </div>

      <div class="calendar-form-col calendar-form-col--middle">
        <div class="field field-sections">
          <label>Required sections</label>
          <div id="requiredSectionsBox" class="checklist calendar-sections-grid"></div>
        </div>
      </div>

      <div class="calendar-form-col calendar-form-col--right">
        <div class="field field-task">
          <label>Task</label>
          <textarea id="occasion" rows="8"></textarea>
        </div>
        <div class="row calendar-form-actions">
          <button class="btn primary" id="saveEventBtn" type="submit">Create event</button>
          <button class="btn" id="resetFormBtn">Reset</button>
        </div>
      </div>
    </form>
    <div id="msg" class="small" style="color:var(--danger); font-weight:800; margin-top:10px;"></div>
  </section>

    <section class="card col-12 calendar-events-card">
    <div class="calendar-events-head">
      <div>
        <div class="calendar-events-title">Events</div>
        <div class="calendar-events-subtitle">Track deadlines, submitters and workflow status.</div>
      </div>
    </div>

    <div class="calendar-events-tablewrap">
      <table class="table calendar-events-table">
        <thead><tr><th>Title</th><th>Country</th><th>Deadline</th><th>Submitter</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="eventsTbody"></tbody>
      </table>
    </div>

    <div id="eventsCards" class="calendar-events-cards"></div>
    <div id="eventsEmpty" class="calendar-events-empty" hidden>No events yet.</div>
  </section>
</div></div>

  </main>
</div>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/calendar.js"></script>
</body>
</html>
