<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GOV COLLAB PORTAL • Login</title>
  <link rel="stylesheet" href="styles.css?v=20260306sb1" />
  <link rel="stylesheet" href="styles/apple.css?v=20260306sb1" />
  <style>
    .login-wrap { max-width: 520px; margin: 0 auto; padding-top: 70px; }
    .login-btn  { min-width: 110px; }
    .login-logo {
      display: block; width: 144px; height: auto; margin: 0 0 20px;
      filter: invert(22%) sepia(20%) saturate(800%) hue-rotate(172deg) brightness(90%) contrast(95%);
      -webkit-mask-image: linear-gradient(135deg, #2b445b 60%, #4a7096 100%);
      mask-image: linear-gradient(135deg, #2b445b 60%, #4a7096 100%);
    }
    @media (max-width: 600px) {
      .login-wrap    { padding-top: 28px; padding-left: 16px; padding-right: 16px; }
      .login-actions { flex-direction: column; align-items: stretch; }
      .login-btn     { width: 100%; }
      .login-logo    { width: 117px; }
    }
  </style>
</head>
<body>
  <div class="main login-wrap">
    <div class="card">
      <img src="assets/logo.svg" alt="GOV COLLAB PORTAL" class="login-logo" />

      <form id="loginForm" class="grid">
        <div class="col-12 field">
          <label>Username</label>
          <input id="username" type="text" autocomplete="username" required />
        </div>
        <div class="col-12 field">
          <label>Password</label>
          <input id="password" type="password" autocomplete="current-password" required />
        </div>
        <div class="col-12 row login-actions" style="justify-content:space-between;">
          <button class="btn primary login-btn" type="submit">Login</button>
          <div id="errBox" class="small" style="color:var(--danger); font-weight:800;"></div>
        </div>
      </form>
    </div>
  </div>

  <script src="js/config.js?v=20260313c"></script>
  <script src="js/api.js?v=20260313c"></script>
  <script src="js/login.js?v=20260313c"></script>
</body>
</html>
