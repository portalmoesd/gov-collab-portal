<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GOV COLLAB PORTAL • Library</title>
  <link rel="stylesheet" href="styles.css?v=20260306sb1" />
  <link rel="stylesheet" href="styles/apple.css?v=20260306sb1" />
</head>
<body>

<div class="layout">
  <aside class="sidebar"></aside>
  <main class="main">
    <div class="topbar topbar-ghost">
      <div class="page-title">Library</div>
    </div>

<div class="grid">
  <section class="card col-12">
    <div class="row" style="justify-content:space-between;">
      <div class="field">
        <label>Country</label>
        <select id="countrySelect"></select>
      </div>
      <div id="msg" class="small" style="color:var(--danger); font-weight:800;"></div>
    </div>
  </section>

  <section class="card required-sections-panel col-12" id="approvedDocsPanel">
    <div class="required-sections-head">
      <div>
        <div class="required-sections-title">Approved documents</div>
        <div class="required-sections-subtitle">Preview documents, export to PDF or Word, and access other files.</div>
      </div>
    </div>

    <div class="required-sections-tablewrap">
      <table class="table required-sections-table">
        <thead><tr>
          <th style="width:30%">Event</th>
          <th style="width:15%">Deadline</th>
          <th style="width:20%">Last updated</th>
          <th class="th-actions" style="width:35%; text-align:right;">Actions</th>
        </tr></thead>
        <tbody id="docsTbody"></tbody>
      </table>
    </div>

    <div id="docsCards" class="required-sections-cards"></div>
    <div id="docsEmpty" class="required-sections-empty" hidden>No approved documents for this country yet.</div>
  </section>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <div class="close-row"><button class="btn" id="closeModalBtn">Close</button></div>
    <div id="modalContent"></div>
  </div>
</div>

  </main>
</div>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
  <script src="js/docx-export.js?v=20260318"></script>
  <script src="js/library.js"></script>
</body>
</html>
