<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GOV COLLAB PORTAL • Collaborator Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="styles/apple.css" />
</head>
<body>

<div class="layout">
  <aside class="sidebar"></aside>
  <main class="main">
    <div class="topbar topbar-ghost">
      <div class="page-title">Collaborator Dashboard</div>
    </div>
    
<div class="grid">
  <section class="card col-12" id="openEditorSection">
    <div style="font-weight:900; margin-bottom:10px;">Open Talking Points editor</div>
    <div class="row">
      <div class="field">
        <label>Event</label>
        <select id="eventSelect"></select>
      </div>
<div class="field">
        <label>Section (assigned)</label>
        <select id="sectionSelect"></select>
      </div>
      <div style="align-self:flex-end;">
        <button class="btn primary" id="openEditorBtn">Open editor</button>
      </div>
    </div>
    <div id="sectionStatusBox" style="display:none; margin-top:12px; padding:10px 12px; border-radius:12px; border:1px solid rgba(43,68,91,.15); background: rgba(43,68,91,.04);"></div>
    <div id="msg" class="small" style="color:var(--danger); font-weight:800; margin-top:10px;"></div>
  </section>

  <section class="card col-12">
    <div style="font-weight:900; margin-bottom:10px;">Upcoming events</div>
    <div class="upcoming-split">
      <div id="eventsCalendar" class="events-calendar"></div>
      <div id="eventsGrid" class="event-grid"></div>
    </div>
  </section>
</div>

  </main>
</div>
  <script src="js/config.js?v=40"></script>
  <script src="js/api.js?v=40"></script>
  <script src="js/app.js?v=40"></script>
  <script src="js/dashboard-collab.js?v=40"></script>
  <script src="js/calendar-collab.js?v=1"></script>
</body>
</html>
